services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: printer-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: printer_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: printer-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - timescaledb

  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: printer-ingest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: printer_monitor
    depends_on:
      - timescaledb

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: printer-simulator
    restart: unless-stopped
    environment:
      INGEST_URL: http://ingest:8080/api/v1/telemetry
    depends_on:
      - ingest

volumes:
  timescaledb_data:
  grafana_data: